<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Free Trial — AI Assistant Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 420px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        h2 { margin-bottom: 6px; color: #1a1a2e; font-size: 22px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .trial-badge { display: inline-block; background: #ecfdf5; color: #059669; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
        input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #4f46e5; }
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 42px; }
        .pw-toggle { position: absolute; right: 12px; top: 11px; cursor: pointer; font-size: 16px; color: #888; background: none; border: none; padding: 0; width: auto; }
        .pw-toggle:hover { background: transparent; }
        button { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; padding: 8px 12px; background: #fef2f2; border-radius: 6px; }
        .success { color: #059669; font-size: 13px; margin-bottom: 12px; display: none; padding: 12px; background: #ecfdf5; border-radius: 6px; text-align: center; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .footer a { color: #4f46e5; text-decoration: none; }
        .features { margin-bottom: 24px; padding: 12px 16px; background: #f8fafc; border-radius: 8px; }
        .features li { font-size: 13px; color: #555; margin: 4px 0; list-style: none; }
        .features li::before { content: "✓ "; color: #059669; font-weight: 700; }

        /* ── Mobile Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            h2 { font-size: 20px; }
            button { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Start Your Free Trial</h2>
        <p class="subtitle">No credit card required</p>
        <span class="trial-badge">7 days free • 10 queries/day</span>
        <ul class="features">
            <li>AI chatbot trained on your content</li>
            <li>Upload 1 document (up to 10 pages)</li>
            <li>Custom branding & embed widget</li>
            <li>Upgrade anytime for full access</li>
        </ul>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <form onsubmit="return handleSignup(event)" id="signupForm">
            <label>Business Name</label>
            <input type="text" id="business_name" required placeholder="Your Business Name" autocomplete="organization">
            <label>Email</label>
            <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" id="password" required placeholder="Min 8 characters" autocomplete="new-password" minlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
            </div>
            <button type="submit" id="btn">Create Free Account →</button>
        </form>
        <div class="footer">
            Already have an account? <a href="/login">Log in</a> &nbsp;|&nbsp; <a href="/">← Back to home</a>
        </div>
    </div>
    <script>
        async function handleSignup(e) {
            e.preventDefault();
            const errEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const btn = document.getElementById('btn');
            errEl.style.display = 'none';
            successEl.style.display = 'none';
            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const res = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        business_name: document.getElementById('business_name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Signup failed');
                document.getElementById('signupForm').style.display = 'none';
                successEl.innerHTML = '✅ <strong>Account created!</strong><br>Check your email for a verification link to activate your trial.';
                successEl.style.display = 'block';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Create Free Account →';
                btn.disabled = false;
            }
        }
        function togglePw(btn) {
            const input = btn.previousElementSibling;
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }
    </script>
</body>
</html>
