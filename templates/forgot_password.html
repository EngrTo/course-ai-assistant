<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — AI Assistant Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 400px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        h2 { margin-bottom: 6px; color: #1a1a2e; font-size: 22px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
        input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 13px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        .msg { font-size: 13px; margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; display: none; }
        .msg-success { background: #dcfce7; color: #166534; }
        .msg-error { background: #fef2f2; color: #991b1b; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
        .footer a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 Forgot Password</h2>
        <p class="subtitle">Enter your email and we'll send a reset link.</p>
        {% if error %}
        <div class="msg msg-error" style="display:block;">{{ error }}</div>
        {% endif %}
        <div class="msg msg-success" id="success-msg"></div>
        <div class="msg msg-error" id="error-msg"></div>
        <form onsubmit="return handleForgot(event)" id="forgot-form">
            <label>Email</label>
            <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
            <button type="submit" id="btn">Send Reset Link</button>
        </form>
        <div class="footer">
            <a href="/login">← Back to login</a>
        </div>
    </div>
    <script>
        async function handleForgot(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const successEl = document.getElementById('success-msg');
            const errorEl = document.getElementById('error-msg');
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
                });
                const data = await res.json();
                if (data.success) {
                    successEl.textContent = data.message;
                    successEl.style.display = 'block';
                    document.getElementById('forgot-form').style.display = 'none';
                } else {
                    errorEl.textContent = data.error || 'Something went wrong.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Try again.';
                errorEl.style.display = 'block';
            }
            btn.textContent = 'Send Reset Link';
            btn.disabled = false;
            return false;
        }
    </script>
</body>
</html>
