<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 420px; width: 90%; box-shadow: 0 4px 16px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 48px; margin-bottom: 12px; }
        h2 { margin-bottom: 8px; color: #166534; }
        p { color: #555; margin-bottom: 24px; font-size: 14px; line-height: 1.5; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; text-align: left; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4f46e5; }
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 42px; }
        .pw-toggle { position: absolute; right: 12px; top: 10px; cursor: pointer; font-size: 16px; color: #888; background: none; border: none; padding: 0; width: auto; }
        .pw-toggle:hover { background: transparent; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #4338ca; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h2>Payment Successful!</h2>
        <p>Your AI Assistant is ready. Create a password to secure your portal access.</p>
        <div class="error" id="error"></div>
        <form onsubmit="return handleSetPassword(event)">
            <label>Your Email</label>
            <input type="email" id="email" value="{{ email }}" readonly style="background:#f5f5f5;">
            <label>Create Password</label>
            <div class="pw-wrap">
                <input type="password" id="password" required placeholder="Min 8 characters" minlength="8">
                <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
            </div>
            <label>Confirm Password</label>
            <div class="pw-wrap">
                <input type="password" id="password2" required placeholder="Repeat password">
                <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
            </div>
            <button type="submit">Set Password & Go to Portal</button>
        </form>
    </div>
    <script>
        async function handleSetPassword(e) {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (password.length < 8) {
                errEl.textContent = 'Password must be at least 8 characters.';
                errEl.style.display = 'block';
                return false;
            }
            if (password !== password2) {
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return false;
            }

            try {
                const res = await fetch('/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, token: '{{ token }}' }),
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errEl.textContent = data.error || 'Failed to set password.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Connection error.';
                errEl.style.display = 'block';
            }
            return false;
        }
        function togglePw(btn) {
            const input = btn.previousElementSibling;
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }
    </script>
</body>
</html>
