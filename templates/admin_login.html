<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 380px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
        h2 { margin-bottom: 8px; color: #1a1a2e; }
        p { color: #666; margin-bottom: 24px; font-size: 14px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #4f46e5; }
        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 42px; }
        .pw-toggle { position: absolute; right: 12px; top: 10px; cursor: pointer; font-size: 16px; color: #888; background: none; border: none; padding: 0; }
        button { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #2d2d4e; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛡️ Admin Panel</h2>
        <p>Authorized personnel only.</p>
        <div class="error" id="error"></div>
        <form onsubmit="return handleAdminLogin(event)">
            <label>Email</label>
            <input type="email" id="email" required placeholder="admin@example.com">
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" id="password" required placeholder="••••••••">
                <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
            </div>
            <button type="submit">Log In</button>
        </form>
    </div>
    <script>
        async function handleAdminLogin(e) {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    errEl.textContent = data.error || 'Login failed.';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Connection error.';
                errEl.style.display = 'block';
            }
            return false;
        }
        function togglePw(btn) {
            const input = btn.previousElementSibling;
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.textContent = input.type === 'password' ? '👁' : '🙈';
        }
    </script>
</body>
</html>
